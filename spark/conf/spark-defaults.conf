# Iceberg
spark.sql.extensions                        org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.local                     org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.local.type                rest
spark.sql.catalog.local.uri                 http://iceberg-rest:8181
spark.sql.catalog.local.warehouse           s3a://bucket/warehouse
spark.sql.catalog.local.s3.endpoint        http://minio:9000
spark.sql.catalog.local.s3.path-style-access true

# S3A
spark.hadoop.fs.s3a.endpoint                http://minio:9000
spark.hadoop.fs.s3a.access.key              minio
spark.hadoop.fs.s3a.secret.key              minio123
spark.hadoop.fs.s3a.path.style.access       true
spark.hadoop.fs.s3a.impl                    org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled  false
spark.hadoop.fs.s3a.aws.credentials.provider org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# Jars (Spark подхватит всё из этой папки автоматически)
spark.driver.extraClassPath    /opt/spark/extra-jars/*
spark.executor.extraClassPath  /opt/spark/extra-jars/*

spark.jars.packages                   org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0
spark.sql.streaming.checkpointLocation s3a://bucket/checkpoints/
spark.sql.session.timeZone            UTC