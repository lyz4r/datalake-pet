networks:
  datalake-pet:
    driver: bridge

volumes:
  postgres_airflow_data:
  postgres_app_data:
  postgres_superset_data:
  clickhouse_data:
  minio_data:
  superset_home:
  notebooks:
  kafka_data:
  iceberg-rest:     


services:

  # ---------- Kafka (KRaft, no ZooKeeper) ----------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_DELETE_TOPIC_ENABLE: 'true'
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks: [datalake-pet]

  # ---------- Kafka UI ----------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks: [datalake-pet]


  # ---------- MinIO ----------
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks: [datalake-pet]

  # ---------- MinIO init (bucket + folders) ----------
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        mc mb local/bucket || true &&
        mc mb local/bucket/batch_output || true &&
        mc mb local/bucket/kafka_output || true &&
        mc mb local/bucket/warehouse || true &&
        exit 0
      "
    networks: [datalake-pet]

# ---------- Iceberg REST Catalog ----------
  iceberg-rest:
    image: tabulario/iceberg-rest:0.10.0
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://bucket/warehouse
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    depends_on:
      minio:
        condition: service_healthy
    networks: [datalake-pet]

  # ---------- ClickHouse ----------
  clickhouse:
    image: clickhouse/clickhouse-server:23.10
    container_name: clickhouse
    ports:
      - "8123:8123"   # HTTP
      - "9100:9000"   # Native (9000 занят MinIO на хосте)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_ALLOW_SPARK=1
      - CLICKHOUSE_NETWORK_COMPRESSION=1
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CLICKHOUSE_USER} --password ${CLICKHOUSE_PASSWORD} --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [datalake-pet]

  # ---------- Postgres for Airflow ----------
  postgres-airflow:
    image: postgres:14
    container_name: postgres-airflow
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    networks: [datalake-pet]

  # ---------- Airflow Initialization ----------
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-init
    depends_on:
      postgres-airflow:
        condition: service_healthy
    entrypoint: bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username ${AIRFLOW_USERNAME} \
          --password ${AIRFLOW_PASSWORD} \
          --firstname ${AIRFLOW_FIRSTNAME} \
          --lastname ${AIRFLOW_LASTNAME} \
          --role Admin \
          --email ${AIRFLOW_EMAIL} || true
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    restart: "no"
    networks: [datalake-pet]

  # ---------- Airflow Webserver ----------
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      - AIRFLOW__WEBSERVER__RBAC=True
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW_CONN_S3_CONN=s3://minio:minio123@minio:9000/
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    networks: [datalake-pet]

  # ---------- Airflow Scheduler ----------
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW_CONN_S3_CONN=s3://minio:minio123@minio:9000/
      - HOST_PROJECT_DIR=${PWD}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [datalake-pet]

  # ---------- Superset ----------
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_ENV: development
      SUPERSET_LOAD_EXAMPLES: "no"
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    depends_on:
      clickhouse:
        condition: service_healthy
    networks: [datalake-pet]
    volumes:
      - superset_home:/app/superset_home
    entrypoint: >
      bash -c "superset db upgrade &&
               superset fab create-admin
                 --username ${SUPERSET_USERNAME}
                 --firstname ${SUPERSET_FIRSTNAME}
                 --lastname ${SUPERSET_LASTNAME}
                 --email ${SUPERSET_EMAIL}
                 --password ${SUPERSET_PASSWORD} || true &&
               superset init &&
               superset run -h 0.0.0.0 -p 8088"

  # ---------- DBT ----------
  dbt:
    container_name: dbt
    build:
      context: .
      dockerfile: Dockerfile.dbt
    working_dir: /usr/app
    command: ["sleep", "infinity"]
    volumes:
      - ./dbt:/usr/app
      - ./dbt/profiles.yml:/root/.dbt/profiles.yml
    networks: [datalake-pet]
    ports:
      - "8086:8086"

  # ---------- Spark Master ----------
  spark:
    image: apache/spark:3.5.1
    container_name: spark
    user: root
    command:
      - bash
      - -c
      - "/opt/spark/sbin/start-master.sh && tail -f /opt/spark/logs/*"
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./spark/jars:/opt/spark/extra-jars       # ← было /opt/spark/jars
      - ./spark/conf/core-site.xml:/opt/spark/conf/core-site.xml
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    environment:
      - SPARK_NO_DAEMONIZE=true
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [datalake-pet]

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    user: root
    command:
      - bash
      - -c
      - "/opt/spark/sbin/start-worker.sh spark://spark:7077 && tail -f /opt/spark/logs/*"
    depends_on:
      spark:
        condition: service_healthy
    volumes:
      - ./spark/jars:/opt/spark/extra-jars       # ← было /opt/spark/jars
      - ./spark/conf/core-site.xml:/opt/spark/conf/core-site.xml
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_NO_DAEMONIZE=true
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    networks: [datalake-pet]

  # ---------- Jupyter ----------
  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: jupyter
    ports:
      - "8889:8888"
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./scripts:/home/jovyan/scripts
      - ./spark/jars:/opt/spark/jars
    environment:
      - SPARK_MASTER=spark://spark:7077
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - JUPYTER_TOKEN=admin
    depends_on:
      spark:
        condition: service_healthy
    networks: [datalake-pet]